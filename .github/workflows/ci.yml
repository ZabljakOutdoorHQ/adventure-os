name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.0

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run check

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          bun run build 2>&1 | tail -120
